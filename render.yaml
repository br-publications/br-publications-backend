services:
  - type: web
    name: br-publications-backend
    runtime: node
    plan: standard
    # Build: Install deps and compile TypeScript
    buildCommand: npm ci --legacy-peer-deps && npm run build
    startCommand: npm start
    # Run migrations after successful deployment
    postDeploy: npm run db:migrate
    envVars:
      # Set to production only after build is complete
      - key: NODE_ENV
        value: production
      # Ensure npm doesn't prune devDependencies during install
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
