version: '3.8'

services:
  db:
    image: postgres:15
    container_name: br-publications-db
    restart: always
    environment:
      POSTGRES_DB: br_publications_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d br_publications_development" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: br-publications-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=br_publications_development
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - NODE_ENV=development
      - SUPER_ADMIN_EMAIL=publications.br.app@gmail.com
      - SUPER_ADMIN_USERNAME=br_publications
      - SUPER_ADMIN_PASSWORD=BRpublications@app
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USER=publications.br.app@gmail.com
      - EMAIL_PASSWORD=ehbosizeingzldei
      - GOOGLE_CLIENT_ID=475289564338-bjoieqnbf2abi140onried6ao9getu4a.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - CORS_ORIGIN=http://localhost:5173
      - CORS_ORIGIN=http://localhost:8080
      - MAX_OTP_ATTEMPTS=5
      - OTP_EXPIRY_MINUTES=10
      - MAX_FILE_SIZE=10485760
      - UPLOAD_DIR=./uploads
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production_min_32_characters
      - JWT_EXPIRES_IN=5h
      - FRONTEND_URL=https://www.brpublications.com
      - API_DOCS_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
    command: [ "scripts/wait-for-it.sh", "db", "5432", "npm", "run", "start" ]

  pgadmin:
    image: dpage/pgadmin4
    container_name: br-publications-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@brpublications.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
